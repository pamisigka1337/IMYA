<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMYA — запуск проверки</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background:#0b1020; color:#e5e7eb; }
      .wrap { max-width: 920px; margin: 40px auto; padding: 20px; }
      .card { background:#111827; border:1px solid #374151; border-radius:12px; padding:20px; }
      .row { display:flex; gap:12px; flex-wrap:wrap; margin-top:14px; }
      button,a.btn { background:#2563eb; color:#fff; border:0; border-radius:8px; padding:10px 14px; text-decoration:none; cursor:pointer; }
      #status { margin-top: 12px; color:#93c5fd; }
      iframe { width: 100%; height: 70vh; border:1px solid #374151; border-radius: 10px; margin-top: 16px; background:#fff; }
      code { color:#bfdbfe; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Проверка IMYA</h1>
        <p>
          Этот файл сразу открывает приложение, когда dev-сервер запущен.
          Запуск: <code>npm run dev</code> (приложение на <code>http://localhost:5000</code>).
        </p>
        <div class="row">
          <button id="check">Проверить и открыть приложение</button>
          <a class="btn" href="http://localhost:5000" target="_blank" rel="noreferrer">Открыть в новой вкладке</a>
        </div>
        <div id="status">Статус: ожидание проверки…</div>
        <iframe id="appFrame" title="IMYA app" src="about:blank"></iframe>
      </div>
    </div>

    <script>
      const status = document.getElementById('status');
      const frame = document.getElementById('appFrame');
      const APP_URL = 'http://localhost:5000';

      async function openApp() {
        status.textContent = 'Статус: проверяю доступность http://localhost:5000 ...';
        try {
          await fetch(APP_URL, { mode: 'no-cors' });
          frame.src = APP_URL;
          status.textContent = 'Статус: приложение открыто в iframe.';
        } catch (e) {
          frame.src = 'about:blank';
          status.textContent = 'Статус: сервер недоступен. Сначала запусти npm run dev.';
        }
      }

      document.getElementById('check').addEventListener('click', openApp);
      openApp();
    </script>
  </body>
</html>
